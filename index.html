<!DOCTYPE html>
<html lang="en">    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Endless Dodger</title>
        <link rel="stylesheet" href="style.css">
        <script src="main.js" defer></script>
    </head>
    <body>
        <div class="intro show" id="welcome">
            <div class="home">    
                <div class="title"><h1>Endless Dodger</h1></div>
                <h1>Welcome to the game!!!!</h1>
                <p class="tag">How long can you survive mate?</p>
                <div class="points">
                    <div>⚡⚡⚡⚡</div>
                    <div> Fast paced action</div>
                    <div> Progressive difficulty</div>
                    <div> Track your best score</div>
                </div>
                <a id="gobtn" class="action"><span>Start Game</span></a>
            </div>
        </div>
        <div class="gamearena hidden" id="zone">
            <div id="dead" class="ded hidden">
                <div class="box">
                    <h1>Game Over Bro!!!</h1>
                    <p>Your score is : <span id="final">0</span></p>
                    <button id="retry">Restart Game♻️♺</button>
                </div>
            </div>
            <nav class="top">
                <div class="navlinks">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                </div>   
            </nav>
            <div class="dash">
                <div>Score: <span id="scoreshow">0</span></div>
                <div>Best Score: <span id="best">0</span></div>
            </div>
            <canvas id="view" width="700" height="600"></canvas>
            <p style="font-size: 30px; color: aquamarine;">Game is now running...</p>
        </div>
    </body>
</html>
